<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="MagicPhotoEraser">
  <defs>
    <linearGradient id="mpe-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#mpe-tile)"/>
  <!-- Magic eraser: a block eraser tilted, with a seam, plus a sparkle ("magic"). -->
  <g transform="rotate(-28 128 132)">
    <rect x="50" y="116" width="156" height="66" rx="16" fill="#ffffff"/>
    <line x1="150" y1="116" x2="150" y2="182" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- 4-point sparkles, upper-right -->
  <path d="M188 64 C188 86 190 88 212 88 C190 88 188 90 188 112 C188 90 186 88 164 88 C186 88 188 86 188 64 Z" fill="#ffffff"/>
  <path d="M214 108 C214 120 215 121 227 121 C215 121 214 122 214 134 C214 122 213 121 201 121 C213 121 214 120 214 108 Z" fill="#ffffff"/>
</svg>
